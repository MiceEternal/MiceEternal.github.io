<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
      margin: 0;
      padding: 0;
      background: #fafafa;
    }

    .container {
      display: flex;
      max-width: 1000px;
      margin: 40px auto;
      gap: 40px;
    }

    .sidebar {
      width: 260px;
      text-align: center;
    }

    .sidebar img {
      width: 160px;
      border-radius: 50%;
    }

    .sidebar h2 {
      margin: 15px 0 5px;
    }

    .sidebar p {
      color: #555;
      font-size: 14px;
    }

    .sidebar a {
      display: block;
      margin: 5px 0;
      color: #0366d6;
      text-decoration: none;
    }

    .content {
      flex: 1;
    }

    .content h2 {
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    .content p {
      line-height: 1.6;
    }

    .content ul {
      padding-left: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
